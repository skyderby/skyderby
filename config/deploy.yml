service: skyderby

image: skyderby/app

servers:
  web:
    - 88.99.213.244
  workers:
    cmd: bundle exec sidekiq
    hosts:
      - 88.99.213.244

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
  ssl: true
  hosts:
    - skyderby.io
    - www.skyderby.io

env:
  clear:
    WEB_CONCURRENCY: 4
    RAILS_MAX_THREADS: 5
    PORT: 80
    TRACK_SCANNER_URL: http://track-scanner/
    ACTIONCABLE_ALLOWED_ORIGINS: https://skyderby.io
    RAILS_SERVE_STATIC_FILES: 1
    REDIS_DB: 12
    REDIS_CABLE_DB: 11
  secret: &secrets
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - DB_HOST
    - DB_NAME
    - DB_USERNAME
    - DB_PASSWORD
    - MAILER_ASSET_HOST
    - MAILER_URL_HOST
    - SMTP_SERVER
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - REDIS_HOST
    - REDIS_PORT
    - MAPS_API_KEY
    - CESIUM_API_TOKEN
    - HONEYBADGER_API_KEY
    - SKYLIGHT_AUTHENTICATION
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - SHRINE_S3_BUCKET
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_REGION
    - AMPLITUDE_API_KEY
    - STRIPE_PUBLIC_KEY
    - STRIPE_PRIVATE_KEY
    - STRIPE_SIGNING_SECRET
    - TURNSTILE_SITE_KEY
    - TURNSTILE_SECRET_KEY

registry: &registry
  server: ghcr.io
  username: skyksandr
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  logs: app logs -f

volumes:
 - app_storage:/app/public/system

#asset_path: /app/public/assets

# Configure rolling deploys by setting a wait time between batches of restarts.
#
# boot:
#   limit: 10 # Can also specify as a percentage of total hosts, such as "25%"
#   wait: 2

accessories:
  track-scanner:
    service: track-scanner
    image: skyderby/track-scanner:latest
    host: 88.99.213.244
