      tooltip:
        peak_speed: Best 3-second average vertical speed — this is the scored result, not the max instant spike.
        peak_alt: Altitude at which the scoring window happened. Lower air is denser, so a lower peak caps your speed.
        bc: Ballistic coefficient (mass ÷ drag area). Your aerodynamics, independent of altitude. Higher = cleaner, more aggressive position.
        ceiling_gap: How close you got to your own terminal ceiling in the window. Below 95% means you ran out of altitude to accelerate.
      chart:
        title: Speed & acceleration
        axis_label: X axis
